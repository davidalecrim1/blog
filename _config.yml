# Site
name: "Curiosity"
title: "Curiosity"
description: "Siga a curiosidade no mundão de tech"
logo: 'assets/images/logo.jpg'
favicon: 'assets/images/logo.jpg'
baseurl: /blog
# google_analytics: 'TODO'
# disqus: 'TODO'
include: ["_pages"]
permalink: /:title/

# Authors
authors:
  david:
    name: David Alecrim
    display_name: David Alecrim
    avatar: "assets/images/avatar/david.jpeg"
    email: david.socer@hotmail.com
    web: https://www.linkedin.com/in/dsalecrim/
    twitter: https://twitter.com/david_alecrim1
    description: "Passionate Software Engineer"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
# adsense: "disabled"
# adsense-data-ad-client: "ca-pub-3412143450191416"
# adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]